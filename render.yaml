services:
  - type: web
    name: algorithm-arena-backend
    env: node
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        sync: false
